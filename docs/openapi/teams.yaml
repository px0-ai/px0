openapi: 3.1.0
info:
  title: Teams API
  version: 1.0.0
paths:
  /v1/me/teams/{teamID}:
    delete:
      summary: Leave Team
      description: Allows the authenticated user to voluntarily leave a team they belong to.
      operationId: leaveTeam
      tags:
        - Teams
      security:
        - BearerAuth: []
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Left team successfully (No Content)
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Team not found or user not a member of the team
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/teams/{id}/join-requests:
    post:
      summary: Request to Join Team
      description: Creates a pending request for the authenticated user to join a specific team.
      operationId: createJoinRequest
      tags:
        - Teams
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            description: The ID of the team to request to join.
      responses:
        "201":
          description: Join request created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamJoinRequest"
        "400":
          description: Bad Request (already a member)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Team Not Found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "409":
          description: Conflict (already has a pending request)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

components:
  schemas:
    TeamJoinRequest:
      type: object
      required:
        - id
        - team_id
        - user_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
