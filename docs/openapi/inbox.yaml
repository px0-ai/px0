openapi: 3.1.0
info:
  title: Inbox & Join Requests API
  version: 1.0.0
paths:
  /v1/me/inbox:
    get:
      summary: Get Admin Inbox
      description: Returns a list of pending join requests that the authenticated user is authorized to approve or reject.
      operationId: getAdminInbox
      tags:
        - Inbox & Join Requests
      security:
        - BearerAuth: []
      responses:
        "200":
          description: A list of pending join requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  inbox:
                    type: array
                    items:
                      $ref: "#/components/schemas/InboxItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/join-requests/{id}:
    put:
      summary: Resolve Join Request
      description: Approves or rejects a pending join request.
      operationId: resolveJoinRequest
      tags:
        - Inbox & Join Requests
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            description: The ID of the join request to resolve.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [approved, rejected]
                  example: approved
      responses:
        "200":
          description: Resolved request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamJoinRequest"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden (not authorized to approve)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Join Request Not Found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

components:
  schemas:
    TeamJoinRequest:
      type: object
      required:
        - id
        - team_id
        - user_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InboxItem:
      type: object
      required:
        - id
        - team_id
        - team_name
        - user_id
        - user_email
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        team_name:
          type: string
        user_id:
          type: string
          format: uuid
        user_email:
          type: string
          format: email
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
