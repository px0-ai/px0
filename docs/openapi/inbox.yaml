openapi: 3.1.0
info:
  title: Inbox API
  version: 1.0.0
paths:
  /v1/me/inbox:
    get:
      summary: Get Admin Inbox
      description: Returns a list of pending join requests that the authenticated user is authorized to approve or reject.
      operationId: getAdminInbox
      tags:
        - Inbox
      security:
        - BearerAuth: []
      x-edge-cases:
        - "Only returns pending join requests for teams where the user is an admin or is a system admin."
        - "Returns a generic inbox item containing the `type` property as 'join_request' and an embedded `team` object."
      x-test-coverage:
        - "TestJoinRequestsFlow: Verifies that the created team join request is properly listed in the admin's inbox, showing correct embedded team details and user email."
      responses:
        "200":
          description: A list of pending join requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  inbox:
                    type: array
                    items:
                      $ref: "#/components/schemas/InboxItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/join-requests/{id}:
    put:
      summary: Resolve Join Request
      description: Approves or rejects a pending join request.
      operationId: resolveJoinRequest
      tags:
        - Inbox
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            description: The ID of the join request to resolve.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [approved, rejected]
                  example: approved
      x-edge-cases:
        - "Only authorized admins of the team can approve or reject the request."
        - "Join request must be in pending status to be resolved."
      x-test-coverage:
        - "TestJoinRequestsFlow: Verifies that a join request can be approved, updating the user's role and membership."
      responses:
        "200":
          description: Resolved request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamJoinRequest"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden (not authorized to approve)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Join Request Not Found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

components:
  schemas:
    TeamJoinRequest:
      type: object
      required:
        - id
        - team_id
        - user_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InboxItem:
      type: object
      required:
        - id
        - type
        - status
        - created_at
        - updated_at
        - user_id
        - user_email
        - team_id
        - team
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [join_request]
          example: join_request
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user_id:
          type: string
          format: uuid
        user_email:
          type: string
          format: email
        team_id:
          type: string
          format: uuid
        team:
          $ref: "./team-management.yaml#/components/schemas/Team"
