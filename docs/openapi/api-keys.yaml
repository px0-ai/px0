openapi: 3.1.0
info:
  title: API Keys API
  version: 1.0.0
paths:
  /v1/api-keys:
    post:
      summary: Create an API Key
      description: |
        Generates a new programmatic API key for accessing authorized resources.
        The full, secret API key is returned ONLY once in this response and cannot be recovered later.
      operationId: createAPIKey
      tags:
        - API Keys
      security:
        - BearerAuth: []
      x-edge-cases:
        - "Only standard user session tokens can create API keys; existing API keys cannot create or rotate other keys."
        - "If team_ids is omitted or empty, the key is scoped to all teams in the organization."
        - "Every supplied team_id must exist and belong to the specified org_id."
      x-test-coverage:
        - "TestCreateAPIKey_Success: Verifies key creation with an explicit team scope."
        - "TestCreateAPIKey_MissingName: Verifies missing key name returns 400."
        - "TestCreateAPIKey_RequiresAccessToken: Verifies API keys cannot create other API keys."
        - "TestCreateAPIKey_GlobalScope: Verifies empty team_ids creates an org-wide key."
        - "TestCreateAPIKey_AdminScope: Verifies admin operation keys can perform authorized admin actions."
        - "TestCreateAPIKey_RejectsTeamOutsideOrg: Verifies teams from another organization are rejected."
        - "TestCreateAPIKey_RejectsUnknownTeam: Verifies unknown team IDs are rejected."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreatedResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Referenced team not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

    get:
      summary: List API Keys
      description: Lists metadata for all programmatic API keys. Secret key values are omitted.
      operationId: listAPIKeys
      tags:
        - API Keys
      security:
        - BearerAuth: []
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIKey"
                required:
                  - api_keys
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal Server Error

  /v1/api-keys/{id}:
    delete:
      summary: Delete an API Key
      description: Revokes and permanently deletes an API key by its unique UUID.
      operationId: deleteAPIKey
      tags:
        - API Keys
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the API Key to delete.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: API key successfully deleted
        "400":
          description: Invalid UUID format
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: API key not found
        "500":
          description: Internal Server Error

components:
  schemas:
    APIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique API Key identifier.
        name:
          type: string
          description: Human-readable name given to the API key.
        org_id:
          type: string
          format: uuid
          description: UUID of the organization.
        team_id:
          type: string
          format: uuid
          nullable: true
          description: Optional UUID of the team.
        operation:
          type: string
          enum: [read_render, all, admin]
          description: The scope of operations.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the API Key was created.
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the API Key was last used. Null if never used.
      required:
        - id
        - name
        - org_id
        - operation
        - created_at
    CreateAPIKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: Descriptive name for the key.
          example: ci-pipeline
        org_id:
          type: string
          format: uuid
          description: Organization that owns the API key.
        team_ids:
          type: array
          description: Optional list of teams the key can access. Omit or pass an empty array for organization-wide access.
          items:
            type: string
            format: uuid
        operation:
          type: string
          enum: [read_render, all, admin]
          default: read_render
      required:
        - name
        - org_id
    APIKeyCreatedResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique API Key identifier.
        name:
          type: string
          description: Human-readable name of the key.
        key:
          type: string
          description: The fully generated secure raw API Key string. This is returned ONLY ONCE.
          example: ak_7f9ba3271cf881309d9be8c9c0fcae47a95b8d29c3f0b2da8e89cf21e5c3df01
        operation:
          type: string
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation.
      required:
        - id
        - name
        - key
        - operation
        - created_at
