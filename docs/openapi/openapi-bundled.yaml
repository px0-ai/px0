            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              example:
                error: version not found
        '422':
          description: Only draft versions can be modified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              example:
                error: only draft versions can be modified
  /v1/prompts/{id}/versions/{version}/publish:
    post:
      summary: Publish Prompt Version
      description: |
        Publishes a draft version of the prompt template, marking it as 'live'.
        This automatically updates any pre-existing 'live' version to 'archived', maintaining exactly one active live prompt.
      operationId: publishVersion
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique prompt UUID.
          schema:
            type: string
            format: uuid
        - name: version
          in: path
          required: true
          description: Version sequence number to publish.
          schema:
            type: integer
      x-edge-cases:
        - Switches previous live versions to archived status automatically.
        - Returns 422 if the specified version is already 'live'.
      x-test-coverage:
        - 'TestPublishVersion: Verifies that status changes to ''live'' and published_at gets populated.'
        - 'TestPublishVersion_ArchivesPreviousLive: Verifies that publishing v2 transitions v1 status to archived.'
        - 'TestPublishVersion_AlreadyLive: Verifies republishing a live template returns 422.'
      responses:
        '200':
          description: Version published successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/PromptVersion'
                required:
                  - version
        '400':
          description: Bad parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              example:
                error: invalid version number
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              example:
                error: unauthorized
        '404':
          description: Version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              example:
                error: version not found
        '422':
          description: Publishing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
              example:
                error: only draft versions can be modified
  /v1/prompts/{id}/versions/{version}/render:
    post:
      summary: Render Specific Prompt Version
      description: Renders a specific template version of a prompt (even draft status) using supplied variables.
      operationId: renderVersion
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
