                      $ref: '#/components/schemas/Tool'
  /v1/tools:
    get:
      summary: List All Tools (global, with filtering)
      description: Lists tools globally, optionally filtered by an explicit project ID query parameter.
      operationId: listAllTools
      tags:
        - Tools
      security:
        - BearerAuth: []
      parameters:
        - name: project
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: The ID of the project to filter by.
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Alternate query parameter for filtering by project ID.
      responses:
        '200':
          description: List of tools
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tool'
  /v1/tools/{id}:
    get:
      summary: Get a Tool
      description: Retrieves details of a specific tool by ID or slug.
      operationId: getTool
      tags:
        - Tools
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID (UUID) or slug of the tool.
      responses:
        '200':
          description: Tool details
          content:
            application/json:
              schema:
                type: object
                properties:
                  tool:
                    $ref: '#/components/schemas/Tool'
        '404':
          description: Tool not found
    put:
      summary: Update a Tool
      description: Updates the metadata of a specific tool.
      operationId: updateTool
      tags:
        - Tools
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID (UUID) or slug of the tool.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateToolRequest'
      responses:
        '200':
          description: Tool updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  tool:
                    $ref: '#/components/schemas/Tool'
        '404':
          description: Tool not found
    delete:
      summary: Delete a Tool
      description: Deletes a specific tool and all its versions.
      operationId: deleteTool
      tags:
        - Tools
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID (UUID) or slug of the tool.
      responses:
        '204':
          description: Tool deleted successfully
        '404':
          description: Tool not found
  /v1/tools/{id}/versions:
    get:
      summary: List Tool Versions
      description: Lists all versions of a tool.
      operationId: listToolVersions
      tags:
        - Tool Versions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID or slug of the tool.
      responses:
        '200':
          description: List of versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: '#/components/schemas/ToolVersion'
    post:
      summary: Create a Tool Version
      description: Creates a new empty draft version.
      operationId: createToolVersion
      tags:
        - Tool Versions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID or slug of the tool.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateToolVersionRequest'
      responses:
        '201':
          description: Version created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/ToolVersion'
  /v1/tools/{id}/versions/{version}:
    get:
      summary: Get a Tool Version
      description: Retrieves details of a specific tool version.
      operationId: getToolVersion
      tags:
        - Tool Versions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID or slug of the tool.
        - name: version
          in: path
          required: true
          schema:
            type: integer
          description: The version number.
      responses:
        '200':
          description: Version details
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/ToolVersion'
        '404':
          description: Version not found
    put:
      summary: Update a Tool Version
      description: Updates the schemas of a draft tool version.
      operationId: updateToolVersion
      tags:
        - Tool Versions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID or slug of the tool.
        - name: version
          in: path
          required: true
          schema:
            type: integer
          description: The version number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateToolVersionRequest'
      responses:
        '200':
          description: Version updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/ToolVersion'
        '404':
          description: Version not found
        '422':
          description: Only draft versions can be modified
    delete:
      summary: Delete or Archive a Tool Version
      description: Deletes a specific tool version if it is in draft status, otherwise archives it.
      operationId: deleteToolVersion
      tags:
        - Tool Versions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID or slug of the tool.
        - name: version
          in: path
          required: true
          schema:
            type: integer
          description: The version number.
      responses:
        '204':
          description: Version deleted successfully
        '404':
          description: Version not found
  /v1/tools/{id}/versions/{version}/promote:
    post:
      summary: Promote a Tool Version
      description: 'Promotes version status: draft -> stable -> live.'
      operationId: promoteToolVersion
      tags:
        - Tool Versions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID or slug of the tool.
        - name: version
          in: path
          required: true
          schema:
            type: integer
          description: The version number.
      responses:
        '200':
          description: Version promoted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/ToolVersion'
        '404':
          description: Version not found
  /v1/tools/{id}/versions/{version}/demote:
    post:
      summary: Demote a Tool Version
      description: 'Demotes version status: live -> stable.'
      operationId: demoteToolVersion
      tags:
        - Tool Versions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID or slug of the tool.
        - name: version
          in: path
          required: true
          schema:
            type: integer
          description: The version number.
      responses:
        '200':
          description: Version demoted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/ToolVersion'
        '404':
          description: Version not found
  /v1/tools/{id}/versions/{version}/archive:
    post:
      summary: Archive a Tool Version
      description: Archives a specific tool version.
      operationId: archiveToolVersion
      tags:
        - Tool Versions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID or slug of the tool.
        - name: version
          in: path
          required: true
          schema:
            type: integer
          description: The version number.
      responses:
        '200':
          description: Version archived successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/ToolVersion'
        '404':
          description: Version not found
  /v1/tools/{id}/versions/{version}/duplicate:
    post:
      summary: Duplicate a Tool Version
      description: Creates a new draft version by duplicating the schemas of an existing tool version.
      operationId: duplicateToolVersion
      tags:
        - Tool Versions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID or slug of the tool.
        - name: version
          in: path
          required: true
          schema:
            type: integer
          description: The version number to duplicate.
      responses:
        '201':
          description: Version duplicated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/ToolVersion'
        '404':
          description: Version not found
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Use an access token retrieved from login (Bearer sess_...) or a programmatic API key (Bearer ak_...).
  schemas:
    APIError:
      type: object
      properties:
        error:
          type: string
          example: invalid credentials
      required:
        - error
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique user identifier.
        email:
          type: string
          format: email
          description: Email address of the user.
        is_verified:
          type: boolean
          description: Whether the user's email has been verified.
        is_admin:
          type: boolean
          description: Whether the user is an admin.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the user was created.
      required:
        - id
        - email
        - is_verified
        - is_admin
        - created_at
    APIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique API Key identifier.
        name:
          type: string
          description: Human-readable name given to the API key.
        org_id:
          type: string
          format: uuid
          description: UUID of the organization.
        team_id:
          type: string
          format: uuid
          nullable: true
          description: Optional UUID of the team.
        operation:
          type: string
          enum:
            - read_render
            - all
            - admin
          description: The scope of operations.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the API Key was created.
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the API Key was last used. Null if never used.
      required:
        - id
        - name
        - org_id
        - operation
        - created_at
    Organization:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
    OrganizationWithRole:
      type: object
      required:
        - id
        - name
        - role
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
          enum:
            - ADMIN
            - MEMBER
          example: ADMIN
        created_at:
          type: string
          format: date-time
    Team:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
    TeamJoinRequest:
      type: object
      required:
        - id
        - team_id
        - user_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    InboxItem:
      type: object
      required:
        - id
        - type
        - status
        - created_at
        - updated_at
        - payload
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - join_request
          example: join_request
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        payload:
          oneOf:
            - $ref: '#/components/schemas/JoinRequestPayload'
    JoinRequestPayload:
      type: object
      required:
        - user_id
        - user_email
        - team_id
        - team
      properties:
        user_id:
          type: string
          format: uuid
        user_email:
          type: string
          format: email
        team_id:
          type: string
          format: uuid
        team:
          $ref: '#/components/schemas/Team'
    Prompt:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier.
        project_id:
          type: string
          format: uuid
          description: Unique identifier of the project the prompt belongs to.
        slug:
          type: string
          description: Unique slug within the project.
        name:
          type: string
          description: Name of the prompt container.
        description:
          type: string
          description: Brief summary explaining the prompt purpose.
        status:
          type: string
          enum:
            - active
            - archived
          description: Current status of the prompt container (active, archived).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - project_id
        - slug
        - name
        - description
        - status
        - created_at
        - updated_at
    PromptVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique version identifier.
        prompt_id:
          type: string
          format: uuid
          description: Reference to parent Prompt ID.
        version:
          type: integer
          description: Incrementing sequence number of the version.
        template:
          type: string
          description: The template syntax code with Go template parameters.
          example: Hello {{.name}}!
        status:
          type: string
          enum:
            - draft
            - stable
            - live
            - archived
          description: Active lifecycle status of this template version.
        model:
          type: string
          nullable: true
          description: Optional `provider/model` identifier intended to execute this prompt version.
          example: anthropic/claude-opus-4-6
        model_params:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional provider-specific model parameters. Nested values are supported.
          example:
            temperature: 0.7
            max_tokens: 1024
            thinking:
              type: enabled
              budget_tokens: 512
        created_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when status was set to live. Null if draft.
        tags:
          type: array
          items:
            type: string
          description: List of tag strings attached to this version.
      required:
        - id
        - prompt_id
        - version
        - template
        - status
        - model
        - model_params
        - created_at
        - published_at
        - tags
    RenderRequest:
      type: object
      properties:
        variables:
          type: object
          additionalProperties: true
          description: Key-value dictionary of arguments interpolated into the prompt template.
          example:
            name: Alice
            count: 5
    RenderResponse:
      type: object
      properties:
        rendered:
          type: string
          description: Fully parsed template response with variable replacements.
          example: Hello, Alice! Count is 5.
        version:
          type: integer
          description: Sequence version number that was executed.
          example: 1
        slug:
          type: string
          description: Unique prompt slug.
          example: my_prompt
        tags:
          type: array
          items:
            type: string
          description: List of tag strings assigned to this version.
        model:
          type: string
          nullable: true
          description: Optional `provider/model` identifier intended to execute this prompt version.
          example: anthropic/claude-opus-4-6
        model_params:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional provider-specific model parameters. Nested values are supported.
          example:
            temperature: 0.7
            max_tokens: 1024
      required:
        - rendered
        - version
        - slug
        - tags
        - model
        - model_params
    RunRequest:
      type: object
      properties:
        variables:
          type: object
          additionalProperties: true
          description: Variables to interpolate into the template.
        stream:
          type: boolean
          description: Set to true to receive token stream instead of a blocked response.
          default: false
        model:
          type: string
          nullable: true
          description: 'Ad-hoc model override. Must start with a supported provider prefix: ''openai/'', ''anthropic/'', ''gemini/'', ''deepseek/'', ''groq/'', or ''openrouter/''. All providers except ''anthropic/'' follow standard OpenAI-compatible JSON request, response, and SSE streaming conventions.'
        model_params:
          type: object
          nullable: true
          additionalProperties: true
          description: Ad-hoc model parameters override.
    RunResponse:
      type: object
      properties:
        response:
          type: string
          description: Text content produced by the model provider completion.
          example: Greetings from the model!
        model:
          type: string
          description: The model identifier that was executed.
          example: openai/gpt-4o
        version:
          type: integer
          description: The prompt version number that was used.
          example: 2
        slug:
          type: string
          description: Prompt slug.
          example: my-prompt
      required:
        - response
        - model
        - version
        - slug
    PromptPayload:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique payload identifier.
        prompt_id:
          type: string
          format: uuid
          description: Reference to parent Prompt ID.
        name:
          type: string
          nullable: true
          description: Optional name for this sample payload.
        variables:
          type: object
          description: Standard JSON object containing variable names and sample values.
          example:
            user: Arpit
            role: Admin
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - prompt_id
        - variables
        - created_at
        - updated_at
    CreatePromptPayloadRequest:
      type: object
      properties:
        variables:
          type: object
          description: JSON object containing variable names and sample values.
          example:
            user: Arpit
            role: Admin
      required:
        - variables
    UpdatePromptPayloadRequest:
      type: object
      properties:
        name:
          type: string
          description: Optional name for this sample payload.
