        code:
          type: string
          example: '123456'
      required:
        - email
        - code
    UpdateMeRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: newemail@example.com
      required:
        - email
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
          example: OldSecretPassword123!
        new_password:
          type: string
          minLength: 8
          example: NewSecretPassword123!
      required:
        - current_password
        - new_password
    TriggerPasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: user@example.com
      required:
        - email
    ResetPasswordRequest:
      type: object
      properties:
        code:
          type: string
          example: '123456'
        new_password:
          type: string
          minLength: 8
          example: NewSecretPassword123!
      required:
        - code
        - new_password
    CreateAPIKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: Descriptive name for the key.
          example: ci-pipeline
        org_id:
          type: string
          format: uuid
          description: Organization that owns the API key.
        team_ids:
          type: array
          description: Optional list of teams the key can access. Omit or pass an empty array for organization-wide access.
          items:
            type: string
            format: uuid
        operation:
          type: string
          enum:
            - read_render
            - all
            - admin
          default: read_render
      required:
        - name
        - org_id
    APIKeyCreatedResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique API Key identifier.
        name:
          type: string
          description: Human-readable name of the key.
        key:
          type: string
          description: The fully generated secure raw API Key string. This is returned ONLY ONCE.
          example: ak_7f9ba3271cf881309d9be8c9c0fcae47a95b8d29c3f0b2da8e89cf21e5c3df01
        operation:
          type: string
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation.
      required:
        - id
        - name
        - key
        - operation
        - created_at
    TeamMemberResponse:
      type: object
      required:
