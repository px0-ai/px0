                required:
                  - tags
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}/tags/{tag}:
