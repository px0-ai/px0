openapi: 3.1.0
info:
  title: Prompts & Rendering API
  version: 1.0.0
paths:
  /v1/teams/{teamID}/prompts:
    post:
      summary: Create a Prompt
      description: Creates a new prompt container.
      operationId: createPrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the team.
      x-test-coverage:
        - "TestCreatePrompt_Success: Verifies prompt creation and response payload."
        - "TestCreatePrompt_MissingName: Verifies that missing name returns 400 and 'name is required'."
        - "TestCreatePrompt_Unauthorized: Verifies that unauthenticated request returns 401."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromptRequest"
      responses:
        "201":
          description: Prompt created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                invalid_body:
                  value: { "error": "invalid request body" }
                name_required:
                  value: { "error": "name is required" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

    get:
      summary: List Prompts
      description: Lists all available prompt containers.
      operationId: listPrompts
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the team.
        - name: archived
          in: query
          required: false
          description: Optional boolean to filter prompts by archive state.
          schema:
            type: boolean
      x-test-coverage:
        - "TestListPrompts: Verifies listing populated prompt containers."
        - "TestListPrompts_Empty: Verifies that listing when empty returns an empty array."
      responses:
        "200":
          description: List of prompts
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Prompt"
                required:
                  - prompts
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

  /v1/prompts:
    get:
      summary: List all prompts with team filter
      description: Returns a list of prompts. If team_id query parameter is not provided, returns an empty list by default. Users can filter by a team they are a member of.
      operationId: listAllPrompts
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: team_id
          in: query
          required: false
          description: Optional UUID of the team to filter prompts (alias of team).
          schema:
            type: string
            format: uuid
        - name: team
          in: query
          required: false
          description: Optional UUID of the team to filter prompts (alias of team_id).
          schema:
            type: string
            format: uuid
        - name: archived
          in: query
          required: false
          description: Optional boolean to filter prompts by archive state.
          schema:
            type: boolean
      x-edge-cases:
        - "By default with no team_id query parameter, returns an empty list of prompts."
        - "If a team_id is provided, checks if the user is a member of that team, otherwise returns 403 Forbidden."
      x-test-coverage:
        - "TestListAllPrompts: Verifies that no team_id returns 200 with an empty list."
        - "TestListAllPrompts: Verifies that a valid team_id returns 200 with prompts of that team."
        - "TestListAllPrompts: Verifies that an unallowed team_id returns 403 Forbidden."
      responses:
        "200":
          description: A list of prompts
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Prompt"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}:
    get:
      summary: Get a Prompt
      description: Returns details of a specific prompt container by its unique UUID.
      operationId: getPrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt.
          schema:
            type: string
            format: uuid
      x-test-coverage:
        - "TestGetPrompt_Success: Verifies finding a prompt by ID."
        - "TestGetPrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "200":
          description: Prompt details
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt id"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"
    put:
      summary: Update a Prompt
      description: Updates the description of a specific prompt by its unique UUID.
      operationId: updatePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptRequest"
      x-edge-cases:
        - "Forbidden: Attempting to update a prompt with viewer permissions."
        - "NotFound: Attempting to update a non-existent prompt ID or a prompt under an unauthorized team."
      x-test-coverage:
        - "TestUpdatePrompt_Success: Verifies updating description with editor token."
        - "TestUpdatePrompt_ViewerForbidden: Verifies viewer gets a 403 response."
        - "TestUpdatePrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "200":
          description: Prompt updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid input or invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid request body"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden - Viewer or unauthorized team member
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "forbidden"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}/archive:
    post:
      summary: Archive a Prompt
      description: Archives a specific prompt container, setting `status` to 'archived'. The prompt still exists in the system and people can call it and use it, so a prompt is never deleted. Requires Org Admin or Team Admin privileges (GitHub repo owner model). Team Editors and Team Members are not authorized to archive prompts.
      operationId: archivePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      x-edge-cases:
        - "Only Org Admins and Team Admins can archive a prompt."
        - "Team Editors and Team Members (viewers) are forbidden from archiving prompts."
      x-test-coverage:
        - "TestArchivePrompt_Permissions: Verifies that a Team Member (viewer) cannot archive a prompt (returns 403 Forbidden)."
        - "TestArchivePrompt_Permissions: Verifies that a Team Editor cannot archive a prompt (returns 403 Forbidden)."
        - "TestArchivePrompt_Permissions: Verifies that a Team Admin can successfully archive a prompt (returns 200 OK with prompt details)."
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt to archive.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Prompt successfully archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt id"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "forbidden"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

  /v1/prompts/{id}/render:
    post:
      summary: Render Live Prompt Version
      description: Renders the active 'live' template version of a prompt using supplied variables.
      operationId: renderLive
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique prompt UUID.
          schema:
            type: string
            format: uuid
      x-edge-cases:
        - "Fails with 404 if no live version is found."
        - "Fails with 422 if template execution fails due to invalid parameters or template syntax mismatches."
      x-test-coverage:
        - "TestRenderLive_Success: Verifies rendering with complete variables returning 200 OK."
        - "TestRenderLive_NoLiveVersion: Verifies that requesting a render with only 'draft' versions fails with 404 and 'no live version found for this prompt'."
        - "TestRenderLive_NoVariables: Verifies static templates render correctly when empty variables are supplied."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderRequest"
      responses:
        "200":
          description: Rendered template string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderResponse"
        "400":
          description: Invalid UUID or bad body JSON
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt id"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Prompt or live version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                prompt_not_found:
                  value: { "error": "prompt not found" }
                no_live_version:
                  value: { "error": "no live version found for this prompt" }
        "422":
          description: Render execution failed
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "template execution failed: ..."
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

  /v1/prompts/{id}/versions:
    post:
      summary: Create a Prompt Version
      description: Creates a new version of the prompt template in 'draft' state.
      operationId: createVersion
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique prompt UUID.
          schema:
            type: string
            format: uuid
      x-edge-cases:
        - "Validates template string syntax using Go's text/template parser before creating the entry."
      x-test-coverage:
        - "TestCreateVersion_Success: Verifies version number is incremented to draft status 1."
        - "TestCreateVersion_InvalidTemplate: Verifies syntax check fails with 400 and 'invalid template'."
        - "TestCreateVersion_MissingTemplate: Verifies missing template rejects with 400 and 'template is required'."
        - "TestCreateVersion_PromptNotFound: Verifies 404 response on missing parent prompt UUID."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionRequest"
      responses:
        "201":
          description: Version created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/PromptVersion"
                required:
                  - version
        "400":
          description: Invalid template or syntax error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                missing_template:
                  value: { "error": "template is required" }
                syntax_error:
                  value: { "error": "invalid template: template parse error..." }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

    get:
      summary: List Prompt Versions
      description: Lists all template versions associated with a prompt container.
      operationId: listVersions
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique prompt UUID.
          schema:
            type: string
            format: uuid
        - name: tags
          in: query
          required: false
          description: Optional comma-separated list of tags to filter prompt versions.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Optional status to filter prompt versions by (draft, live, archived).
          schema:
            type: string
            enum: [draft, live, archived]
      x-test-coverage:
        - "TestListVersions: Verifies active versions listing."
      responses:
        "200":
          description: List of versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/PromptVersion"
                required:
                  - versions
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"

  /v1/prompts/{id}/versions/{version}:
    get:
      summary: Get Prompt Version
      description: Retrieves details of a specific prompt template version by version number.
      operationId: getVersion
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique prompt UUID.
          schema:
            type: string
            format: uuid
        - name: version
          in: path
          required: true
          description: Version sequence number (integer) or version tag (string).
          schema:
            type: string
      x-test-coverage:
        - "TestGetVersion: Verifies details retrieval of specific version."
        - "TestGetVersion_NotFound: Verifies 404 response on missing version sequence number."
      responses:
        "200":
          description: Prompt version details
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/PromptVersion"
                required:
                  - version
        "400":
          description: Invalid path formatting
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid version number"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "version not found"

    put:
      summary: Update Prompt Version Draft
      description: |
        Updates the draft template code of a specific version.
        Only versions currently in the 'draft' status may be modified.
      operationId: updateVersion
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique prompt UUID.
          schema:
            type: string
            format: uuid
        - name: version
          in: path
          required: true
          description: Version sequence number (integer) or version tag (string) to update.
          schema:
            type: string
      x-edge-cases:
        - "Fails with 422 Unprocessable Entity if the version status is not 'draft' (e.g. attempting to update a live/archived template)."
      x-test-coverage:
        - "TestUpdateVersion_Draft: Verifies modification updates template content and returns 200."
        - "TestUpdateVersion_LiveVersionRejected: Verifies that updating a published live template version fails with 422 and 'only draft versions can be modified'."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVersionRequest"
      responses:
        "200":
          description: Version updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/PromptVersion"
                required:
                  - version
        "400":
          description: Invalid syntax or missing template
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "template is required"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "version not found"
        "422":
          description: Only draft versions can be modified
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "only draft versions can be modified"

    delete:
      summary: Delete Prompt Version Draft
      description: |
        Deletes a specific prompt template version.
        Only versions currently in the 'draft' status may be deleted.
      operationId: deletePromptVersion
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique prompt UUID.
          schema:
            type: string
            format: uuid
        - name: version
          in: path
          required: true
          description: Version sequence number (integer) or version tag (string) to delete.
          schema:
            type: string
      x-edge-cases:
        - "Fails with 422 Unprocessable Entity if the version status is not 'draft' (e.g. attempting to delete a live/archived template)."
      x-test-coverage:
        - "TestDeleteVersion_Draft: Verifies deletion of specific draft version returns 204."
        - "TestDeleteVersion_LiveVersionRejected: Verifies that deleting a published live template version fails with 422 and 'only draft versions can be deleted'."
      responses:
        "204":
          description: Version deleted successfully
        "400":
          description: Invalid path formatting
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid version number"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "version not found"
        "422":
          description: Only draft versions can be deleted
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "only draft versions can be deleted"

  /v1/prompts/{id}/versions/{version}/promote:
    post:
      summary: Promote Prompt Version
      description: |
        Promotes a version of the prompt template along the lifecycle: draft -> stable -> live.
        Promoting from draft makes it stable (read-only). Promoting from stable makes it live.
        When promoting a version to live, any previous live version is demoted to stable.
      operationId: promoteVersion
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique prompt UUID.
          schema:
            type: string
            format: uuid
        - name: version
          in: path
          required: true
          description: Version sequence number (integer) or version tag (string) to promote.
          schema:
            type: string
      x-edge-cases:
        - "Promotes draft to stable, or stable to live."
        - "Switches previous live versions to stable status automatically."
        - "Returns 422 if the specified version is already live or archived."
      x-test-coverage:
        - "TestPromoteVersion: Verifies promotion path draft -> stable -> live."
        - "TestPromoteVersion_DemotesPreviousLive: Verifies demoting previous live version to stable."
      responses:
        "200":
          description: Version promoted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/PromptVersion"
                required:
                  - version
        "400":
          description: Bad parameters
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid version number"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "version not found"
        "422":
          description: Promotion error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "cannot promote version"

  /v1/prompts/{id}/versions/{version}/demote:
    post:
      summary: Demote Prompt Version
      description: Demotes a live prompt version to stable (making it inactive but remaining read-only).
      operationId: demoteVersion
      tags:
        - Prompts
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique prompt UUID.
          schema:
            type: string
            format: uuid
        - name: version
          in: path
          required: true
          description: Version sequence number (integer) or version tag (string) to demote.
          schema:
            type: string
      x-edge-cases:
        - "Returns 422 if version is not live."
      x-test-coverage:
        - "TestDemoteVersion_Success: Verifies demoting live version to stable."
      responses:
        "200":
          description: Version demoted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: "#/components/schemas/PromptVersion"
                required:
                  - version
        "400":
          description: Bad parameters
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid version number"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "version not found"
        "422":
          description: Demotion error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "only live versions can be demoted"

  /v1/prompts/{id}/versions/{version}/archive:
