        "404":
          description: Prompt or payload not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

components:
  schemas:
    Prompt:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier.
        team_id:
          type: string
          format: uuid
          description: Unique identifier of the team.
        slug:
          type: string
          description: Unique slug within the team.
        name:
          type: string
          description: Name of the prompt container.
        description:
          type: string
          description: Brief summary explaining the prompt purpose.
        status:
          type: string
          enum: [active, archived]
          description: Current status of the prompt container (active, archived).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - team_id
        - slug
        - name
        - description
        - status
        - created_at
        - updated_at
    PromptVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique version identifier.
        prompt_id:
          type: string
          format: uuid
          description: Reference to parent Prompt ID.
        version:
          type: integer
          description: Incrementing sequence number of the version.
        template:
          type: string
          description: The template syntax code with Go template parameters.
          example: "Hello {{.name}}!"
        status:
          type: string
          enum: [draft, stable, live, archived]
          description: Active lifecycle status of this template version.
        created_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when status was set to live. Null if draft.
        tags:
          type: array
          items:
            type: string
          description: List of tag strings attached to this version.
      required:
        - id
        - prompt_id
        - version
        - template
        - status
        - created_at
        - published_at
        - tags
    CreatePromptRequest:
      type: object
      properties:
        name:
          type: string
          example: My Prompt
        description:
          type: string
          example: Useful prompt
        slug:
          type: string
          example: my_prompt
      required:
        - name
    CreateVersionRequest:
      type: object
      properties:
        template:
          type: string
          example: "Hello, {{.name}}!"
      required:
        - template
    UpdateVersionRequest:
      type: object
      properties:
        template:
          type: string
          example: "Hello, {{.name}}! Count is {{.count}}."
      required:
        - template
    RenderRequest:
      type: object
      properties:
        variables:
          type: object
          additionalProperties: true
          description: Key-value dictionary of arguments interpolated into the prompt template.
          example: { "name": "Alice", "count": 5 }
    RenderResponse:
      type: object
      properties:
        rendered:
          type: string
          description: Fully parsed template response with variable replacements.
          example: "Hello, Alice! Count is 5."
        version:
          type: integer
          description: Sequence version number that was executed.
          example: 1
        slug:
          type: string
          description: Unique prompt slug.
          example: my_prompt
        tags:
          type: array
          items:
            type: string
          description: List of tag strings attached to this version.
      required:
        - rendered
        - version
        - slug
        - tags

    PromptPayload:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique payload identifier.
        prompt_id:
          type: string
          format: uuid
          description: Reference to parent Prompt ID.
        name:
          type: string
          nullable: true
          description: Optional name for this sample payload.
        variables:
          type: object
          description: Standard JSON object containing variable names and sample values.
          example: { "user": "Arpit", "role": "Admin" }
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - prompt_id
        - variables
        - created_at
        - updated_at

    CreatePromptPayloadRequest:
      type: object
      properties:
        variables:
          type: object
          description: JSON object containing variable names and sample values.
          example: { "user": "Arpit", "role": "Admin" }
      required:
        - variables

    UpdatePromptPayloadRequest:
      type: object
      properties:
        name:
          type: string
          description: Optional name for this sample payload.
          example: "Admin Sample"
        variables:
          type: object
          description: JSON object containing variable names and sample values.
          example: { "user": "Alice", "role": "Editor" }

    UpdatePromptRequest:
      type: object
      properties:
        description:
          type: string
          description: Brief summary explaining the prompt purpose.
          example: "Useful greeting prompt"
