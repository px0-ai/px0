openapi: 3.1.0
info:
  title: Prompts & Rendering API
  version: 1.0.0
paths:
  /v1/projects/{projectID}/prompts:
    post:
      summary: Create a Prompt
      description: Creates a new prompt inside a project. The requester must be an editor-or-above on the project (via the owning team or a granted team).
      operationId: createPrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the project.
      x-edge-cases:
        - "A viewer of the project is refused with 403; an unknown project returns 404."
        - "Slug uniqueness is scoped to the project, so the same slug may exist in another project."
      x-test-coverage:
        - "TestCreatePrompt_Success: Verifies prompt creation and response payload."
        - "TestCreatePrompt_MissingName: Verifies that missing name returns 400 and 'name is required'."
        - "TestCreatePrompt_ForbiddenForViewer: Verifies a viewer cannot create a prompt (403)."
        - "TestCreatePrompt_UnknownProject: Verifies an unknown project returns 404."
        - "TestCreatePrompt_Unauthorized: Verifies that unauthenticated request returns 401."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromptRequest"
      responses:
        "201":
          description: Prompt created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                invalid_body:
                  value: { "error": "invalid request body" }
                name_required:
                  value: { "error": "name is required" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden (requester is not an editor of the project)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "409":
          description: A prompt with this name or slug already exists in the project
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

    get:
      summary: List Prompts
      description: Lists the prompts inside a project. The requester must be able to reach the project.
      operationId: listPrompts
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the project.
        - name: archived
          in: query
          required: false
          description: Optional boolean to filter prompts by archive state.
          schema:
            type: boolean
      x-edge-cases:
        - "An API key reaches the prompts of every project its teams can access — owned or granted — and loses that reach when the grant is revoked."
      x-test-coverage:
        - "TestListPrompts: Verifies listing populated prompt containers."
        - "TestListPrompts_Empty: Verifies that listing when empty returns an empty array."
        - "TestPrompts_APIKeyAuth: Verifies an API key lists a project owned by its team."
        - "TestAPIKey_ReachesGrantedProject: Verifies an API key reaches a granted project's prompts and is denied after revoke."
        - "TestAPIKey_DeniedForeignProject: Verifies an API key is denied a project its teams cannot access."
      responses:
        "200":
          description: List of prompts
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Prompt"
                required:
                  - prompts
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden (requester cannot reach the project)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

  /v1/prompts:
    get:
      summary: List or Search Prompts
      description: Returns prompts from projects the requester can reach. Supplying q performs hybrid search from one natural-language query; the server retrieves lexical and semantic candidates, reranks them, and returns only authorized prompts. Without q, the existing project-filtered listing behavior is preserved.
      operationId: listAllPrompts
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: false
          description: Optional UUID of the project to filter prompts (alias of project).
          schema:
            type: string
            format: uuid
        - name: project
          in: query
          required: false
          description: Optional UUID of the project to filter prompts (alias of project_id).
          schema:
            type: string
            format: uuid
        - name: archived
          in: query
          required: false
          description: Optional boolean to filter prompts by archive state.
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          description: Natural-language search text. The server—not the client—handles lexical retrieval, semantic retrieval, and reranking. Raw vectors and provider selection are never accepted by the API.
          schema:
            type: string
            minLength: 1
            example: Find a prompt that handles customer refunds
      x-edge-cases:
        - "With neither q nor project_id, returns an empty list to preserve existing behavior."
        - "If a project_id is provided, checks the requester can reach that project, otherwise returns 403 Forbidden."
        - "A q search without project_id spans every project the requester can view, including projects granted to the requester's teams."
        - "A q search with project_id is restricted to that authorized project."
        - "An empty or whitespace-only q returns 400 instead of running an unbounded search."
        - "Search defaults to active prompts; archived=true searches archived prompts instead."
        - "Search results never include prompts from inaccessible projects, even if a retriever returns their IDs."
        - "Provider-specific scores, modes, and vectors are internal and are not exposed in the request or response."
      x-test-coverage:
        - "TestListAllPrompts: Verifies that no project_id returns 200 with an empty list."
        - "TestListAllPrompts: Verifies that a valid project_id returns 200 with prompts of that project."
        - "TestListAllPrompts: Verifies that an unallowed project_id returns 403 Forbidden."
        - "TestSearchPromptsAcrossAccessibleProjects: Verifies natural-language search spans accessible projects, preserves relevance order, and excludes an inaccessible project."
        - "TestSearchPromptsRejectsEmptyQuery: Verifies whitespace-only q returns 400."
        - "TestSearchPromptsExcludesArchivedByDefault: Verifies archived prompts are excluded by default and searchable only with archived=true."
        - "TestAPIKey_ReachesGrantedProject: Verifies API-key search includes prompts from granted projects and stops returning them immediately after access is revoked."
        - "TestPostgresRetrieverSearchesFieldsAndEnforcesScope: Verifies weighted FTS across prompt fields and project isolation."
        - "TestPostgresRetrieverReflectsPromptUpdates: Verifies the generated FTS document tracks prompt updates without a separate indexing job."
        - "TestEngineSearchRetrievesAndReranksBothSources: Verifies lexical and semantic candidates are both retrieved and deterministically fused."
      responses:
        "200":
          description: A list of prompts
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Prompt"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "400":
          description: Invalid or empty search query
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "q query parameter must not be empty"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}:
    get:
      summary: Get a Prompt
      description: Returns details of a specific prompt container by its unique UUID or unique slug. Optionally retrieves version or tag details if requested via query parameters.
      operationId: getPrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID or unique slug of the prompt.
          schema:
            type: string
        - name: version
          in: query
          required: false
          description: Optional version sequence number (integer) or version tag (string) to retrieve along with the prompt details.
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: Optional version tag (string) to retrieve along with the prompt details.
          schema:
            type: string
      x-test-coverage:
        - "TestGetPrompt_Success: Verifies finding a prompt by ID."
        - "TestGetPrompt_BySlugAndVersion: Verifies finding a prompt by slug, with version, and with tag query parameter."
        - "TestGetPrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "200":
          description: Prompt details
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                  version:
                    $ref: "./prompt-versions.yaml#/components/schemas/PromptVersion"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt id"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"
    put:
      summary: Update a Prompt
      description: Updates the description of a specific prompt by its unique UUID.
      operationId: updatePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptRequest"
      x-edge-cases:
        - "Forbidden: Attempting to update a prompt with viewer permissions."
        - "NotFound: Attempting to update a non-existent prompt ID or a prompt under an unauthorized team."
      x-test-coverage:
        - "TestUpdatePrompt_Success: Verifies updating description with editor token."
        - "TestUpdatePrompt_ViewerForbidden: Verifies viewer gets a 403 response."
        - "TestUpdatePrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "200":
          description: Prompt updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid input or invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid request body"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden - Viewer or unauthorized team member
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "forbidden"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}/archive:
    post:
      summary: Archive a Prompt
      description: Archives a specific prompt container, setting `status` to 'archived'. The prompt still exists in the system and people can call it and use it, so a prompt is never deleted. Requires Org Admin or Team Admin privileges (GitHub repo owner model). Team Editors and Team Members are not authorized to archive prompts.
      operationId: archivePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      x-edge-cases:
        - "Only Org Admins and Team Admins can archive a prompt."
        - "Team Editors and Team Members (viewers) are forbidden from archiving prompts."
      x-test-coverage:
        - "TestArchivePrompt_Permissions: Verifies that a Team Member (viewer) cannot archive a prompt (returns 403 Forbidden)."
        - "TestArchivePrompt_Permissions: Verifies that a Team Editor cannot archive a prompt (returns 403 Forbidden)."
        - "TestArchivePrompt_Permissions: Verifies that a Team Admin can successfully archive a prompt (returns 200 OK with prompt details)."
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt to archive.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Prompt successfully archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt id"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "forbidden"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

  /v1/prompts/{id}/restore:
    post:
      summary: Restore a Prompt
      description: Restores a previously archived prompt setting `status` back to 'active'. Requires Team Admin or Org Admin.
      operationId: restorePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Prompt successfully restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}/move:
    post:
      summary: Move a Prompt
      description: Moves a prompt from its current project to another project. Requires admin capability on both the source and target project (owning-team or org admin).
      operationId: movePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      x-edge-cases:
        - "Requires admin on both source and target project; a non-admin on either side is refused with 403."
        - "A move into a project where the prompt's name or slug already exists is rejected with 409."
        - "An unknown prompt or an unknown target project returns 404."
      x-test-coverage:
        - "TestMovePrompt: Verifies an admin moves a prompt between projects (200)."
        - "TestMovePrompt_TargetCollision: Verifies a name/slug collision in the target project returns 409."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - project_id
              properties:
                project_id:
                  type: string
                  format: uuid
                  description: The target project to move the prompt into.
      responses:
        "200":
          description: Prompt successfully moved
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format or project_id
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden (not an admin on the source or target project)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt or target project not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "409":
          description: A prompt with this name or slug already exists in the target project
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

components:
  schemas:
    Prompt:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier.
        project_id:
          type: string
          format: uuid
          description: Unique identifier of the project the prompt belongs to.
        slug:
          type: string
          description: Unique slug within the project.
        name:
          type: string
          description: Name of the prompt container.
        description:
          type: string
          description: Brief summary explaining the prompt purpose.
        status:
          type: string
          enum: [active, archived]
          description: Current status of the prompt container (active, archived).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - project_id
        - slug
        - name
        - description
        - status
        - created_at
        - updated_at
    CreatePromptRequest:
      type: object
      properties:
        name:
          type: string
          example: My Prompt
        description:
          type: string
          example: Useful prompt
        slug:
          type: string
          example: my_prompt
      required:
        - name
    UpdatePromptRequest:
      type: object
      properties:
        description:
          type: string
          description: Brief summary explaining the prompt purpose.
          example: "Useful greeting prompt"
