openapi: 3.1.0
info:
  title: Prompts & Rendering API
  version: 1.0.0
paths:
  /v1/teams/{teamID}/prompts:
    post:
      summary: Create a Prompt
      description: Creates a new prompt container.
      operationId: createPrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the team.
      x-test-coverage:
        - "TestCreatePrompt_Success: Verifies prompt creation and response payload."
        - "TestCreatePrompt_MissingName: Verifies that missing name returns 400 and 'name is required'."
        - "TestCreatePrompt_Unauthorized: Verifies that unauthenticated request returns 401."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromptRequest"
      responses:
        "201":
          description: Prompt created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                invalid_body:
                  value: { "error": "invalid request body" }
                name_required:
                  value: { "error": "name is required" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

    get:
      summary: List Prompts
      description: Lists all available prompt containers.
      operationId: listPrompts
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the team.
        - name: mode
          in: query
          required: false
          description: >
            Search mode. "fts" (default) uses full-text search against the
            tsvector column. "vector" requires a pre-computed ?vector= or a
            query embedder for ?q=. "hybrid" combines FTS and vector
            ranking (not yet implemented — returns 501). Unknown values
            return 400. Defaults to "fts" when absent; callers that omit
            ?mode= but supply a raw ?vector= are routed to "vector" for
            backwards compatibility.
          schema:
            type: string
            enum: [fts, vector, hybrid]
            default: fts
        - name: archived
          in: query
          required: false
          description: Optional boolean to filter prompts by archive state.
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          description: >
            Full-text search query. When provided under ?mode=fts (or
            when ?mode= is absent), results are filtered and ranked by
            relevance across prompt name (weight A), description
            (weight B), and slug (weight C) using PostgreSQL Full-Text
            Search. An empty ?q= short-circuits to an empty result
            set rather than relying on websearch_to_tsquery(''). When
            ?mode=vector is requested without a ?vector=, the embedder
            is used to embed ?q=.
          schema:
            type: string
            example: "summarize text"
        - name: vector
          in: query
          required: false
          description: >
            Pre-computed query embedding for vector-similarity search,
            expressed as a comma-separated list of float32 values
            (e.g. "0.12,0.45,0.98"). When provided, results are ranked
            by vector distance. With ?mode=vector, returns 400 if the
            value cannot be parsed and 501 if the active search
            provider does not support vector search.
          schema:
            type: string
            example: "0.12,0.45,0.98"
        - name: top_k
          in: query
          required: false
          description: >
            Maximum number of results to return when using vector
            search (default: 10). Also caps the FTS results when
            ?mode=fts is requested with a ?q=.
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      x-edge-cases:
        - "When ?q= is absent and ?mode=fts, returns the unranked listing (no FTS)."
        - "When ?q= is present and ?mode=fts, returns FTS results ranked by ts_rank with a minimum-rank threshold."
        - "When ?q= is empty, the FTS path short-circuits to an empty result set (not relying on websearch_to_tsquery(''))."
        - "When ?q= is present and no results match, returns an empty array (not 404)."
        - "When ?mode=vector with neither ?vector= nor ?q=, returns 400."
        - "When ?mode=vector with a ?q= but no embedder configured, returns 501 (no silent alias to FTS)."
        - "When ?mode=vector with a ?q= and embedder present but embedding fails, returns 501 with the embedder error in the body."
        - "When ?mode=vector with a ?vector= but no vector-capable provider active, returns 501."
        - "When ?mode=hybrid, returns 501 (not yet implemented)."
        - "When ?mode= is an unknown value, returns 400."
        - "Backwards-compat: callers that omit ?mode= but supply ?vector= are routed to ?mode=vector."
        - "?top_k= caps FTS results too, not just vector results."
        - "Tags filtering at list endpoints is not part of the current API contract (out of scope)."
        - "Pagination is deferred — no Limit/Offset/TotalCount yet."
        - "The response always includes an 'engine' field identifying the path that served the request (fts, vector, or hybrid)."
        - "Score is internal-only; not exposed in the API response."
      x-test-coverage:
        - "TestListPrompts: Verifies listing populated prompt containers."
        - "TestListPrompts_Empty: Verifies that listing when empty returns an empty array."
        - "TestListPrompts_EngineFieldDefault: Verifies that a no-arg list returns engine=fts."
        - "TestListPrompts_InvalidMode: Verifies that ?mode=bogus returns 400."
        - "TestListPrompts_ModeHybridReturns501: Verifies that ?mode=hybrid returns 501."
        - "TestListPrompts_ModeVectorNoQueryNoVector: Verifies that ?mode=vector with no input returns 400."
        - "TestListPrompts_ModeVectorNoEmbedder: Verifies that ?mode=vector with ?q= and no embedder returns 501."
        - "TestListPrompts_VectorUnsupportedProvider: Verifies that a vector request with a NoopProvider returns 501, not a silent fallthrough."
        - "TestListPrompts_InvalidVector: Verifies that an unparseable ?vector= returns 400."
        - "TestSearchPrompts_FTS: Verifies real tsvector FTS ranking with name (A) > description (B) > slug (C) weights."
      responses:
        "200":
          description: List of prompts
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Prompt"
                  engine:
                    type: string
                    enum: [fts, vector, hybrid]
                    description: >
                      Identifies which ranking path actually served the
                      request. Always present so clients (and tests) can
                      verify the mode they requested is the mode that ran.
                    example: "fts"
                required:
                  - prompts
                  - engine
        "400":
          description: Bad request (invalid mode, invalid vector param, or missing input for the chosen mode)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                invalid_mode:
                  value: { "error": "invalid mode: must be one of 'fts', 'vector', 'hybrid'" }
                invalid_vector:
                  value: { "error": "invalid vector parameter: invalid value \"abc\"" }
                vector_requires_input:
                  value: { "error": "vector mode requires either vector= or q= parameter" }
                unsupported_provider:
                  value: { "error": "vector search not supported by the active search provider" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"
        "501":
          description: Not implemented (vector/hybrid unavailable, or active provider cannot honour the requested mode)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                hybrid_unsupported:
                  value: { "error": "hybrid search not implemented" }
                vector_no_embedder:
                  value: { "error": "vector search unavailable: no embedder configured (set EMBEDDER_PROVIDER and HF_TOKEN)" }
                vector_embed_failed:
                  value: { "error": "vector search unavailable: embedding failed: hf: status 503" }
                fts_not_supported:
                  value: { "error": "fts search not implemented by the active search provider" }
                vector_not_supported:
                  value: { "error": "vector search not implemented by the active search provider" }

  /v1/prompts:
    get:
      summary: List all prompts with team filter
      description: Returns a list of prompts. If team_id query parameter is not provided, returns an empty list by default. Users can filter by a team they are a member of.
      operationId: listAllPrompts
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: team_id
          in: query
          required: false
          description: Optional UUID of the team to filter prompts (alias of team).
          schema:
            type: string
            format: uuid
        - name: team
          in: query
          required: false
          description: Optional UUID of the team to filter prompts (alias of team_id).
          schema:
            type: string
            format: uuid
        - name: mode
          in: query
          required: false
          description: >
            Search mode. Same semantics as on /v1/teams/{teamID}/prompts.
            "fts" (default) uses PostgreSQL FTS, "vector" requires an
            embedder or pre-computed ?vector=, "hybrid" returns 501.
          schema:
            type: string
            enum: [fts, vector, hybrid]
            default: fts
        - name: archived
          in: query
          required: false
          description: Optional boolean to filter prompts by archive state.
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          description: >
            Full-text search query. See /v1/teams/{teamID}/prompts for
            semantics; same weight ordering and same short-circuit
            behaviour for empty values.
          schema:
            type: string
            example: "summarize text"
        - name: vector
          in: query
          required: false
          description: >
            Pre-computed query embedding for vector-similarity search.
            See /v1/teams/{teamID}/prompts for full semantics.
          schema:
            type: string
            example: "0.12,0.45,0.98"
        - name: top_k
          in: query
          required: false
          description: >
            Maximum number of results to return when using vector
            search (default: 10). Also caps FTS results.
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      x-edge-cases:
        - "By default with no team_id query parameter, returns an empty list of prompts (engine=fts)."
        - "If a team_id is provided, checks if the user is a member of that team, otherwise returns 403 Forbidden."
        - "When ?q= is absent and ?mode=fts, returns the unranked listing."
        - "When ?q= is present and ?mode=fts, returns FTS results ranked by ts_rank with a minimum-rank threshold."
        - "When ?q= is empty, the FTS path short-circuits to an empty result set."
        - "When ?q= is present and no results match, returns an empty array (not 404)."
        - "When ?mode=vector, ?mode=hybrid, or other unavailable modes, returns the same 4xx/5xx as on the team-scoped endpoint."
        - "?top_k= caps FTS results too, not just vector results."
        - "The response always includes an 'engine' field identifying the path that served the request."
        - "Pagination is deferred — no Limit/Offset/TotalCount yet."
      x-test-coverage:
        - "TestListAllPrompts: Verifies that no team_id returns 200 with an empty list and engine=fts."
        - "TestListAllPrompts: Verifies that a valid team_id returns 200 with prompts of that team."
        - "TestListAllPrompts: Verifies that an unallowed team_id returns 403 Forbidden."
        - "TestListAllPrompts_EngineField: Verifies that the response always includes engine=fts."
      responses:
        "200":
          description: A list of prompts
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Prompt"
                  engine:
                    type: string
                    enum: [fts, vector, hybrid]
                    description: >
                      Identifies which ranking path actually served
                      the request. Always present.
                    example: "fts"
                required:
                  - prompts
                  - engine
        "400":
          description: Bad request (invalid mode, invalid vector param, or missing input for the chosen mode)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                invalid_mode:
                  value: { "error": "invalid mode: must be one of 'fts', 'vector', 'hybrid'" }
                invalid_vector:
                  value: { "error": "invalid vector parameter: invalid value \"abc\"" }
                vector_requires_input:
                  value: { "error": "vector mode requires either vector= or q= parameter" }
                unsupported_provider:
                  value: { "error": "vector search not supported by the active search provider" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "501":
          description: Not implemented (vector/hybrid unavailable, or active provider cannot honour the requested mode)
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                hybrid_unsupported:
                  value: { "error": "hybrid search not implemented" }
                vector_no_embedder:
                  value: { "error": "vector search unavailable: no embedder configured (set EMBEDDER_PROVIDER and HF_TOKEN)" }
                vector_not_supported:
                  value: { "error": "vector search not implemented by the active search provider" }

  /v1/prompts/{id}:
    get:
      summary: Get a Prompt
      description: Returns details of a specific prompt container by its unique UUID or unique slug. Optionally retrieves version or tag details if requested via query parameters.
      operationId: getPrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID or unique slug of the prompt.
          schema:
            type: string
        - name: version
          in: query
          required: false
          description: Optional version sequence number (integer) or version tag (string) to retrieve along with the prompt details.
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: Optional version tag (string) to retrieve along with the prompt details.
          schema:
            type: string
      x-test-coverage:
        - "TestGetPrompt_Success: Verifies finding a prompt by ID."
        - "TestGetPrompt_BySlugAndVersion: Verifies finding a prompt by slug, with version, and with tag query parameter."
        - "TestGetPrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "200":
          description: Prompt details
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                  version:
                    $ref: "./prompt-versions.yaml#/components/schemas/PromptVersion"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt id"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"
    put:
      summary: Update a Prompt
      description: Updates the description of a specific prompt by its unique UUID.
      operationId: updatePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptRequest"
      x-edge-cases:
        - "Forbidden: Attempting to update a prompt with viewer permissions."
        - "NotFound: Attempting to update a non-existent prompt ID or a prompt under an unauthorized team."
      x-test-coverage:
        - "TestUpdatePrompt_Success: Verifies updating description with editor token."
        - "TestUpdatePrompt_ViewerForbidden: Verifies viewer gets a 403 response."
        - "TestUpdatePrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "200":
          description: Prompt updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid input or invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid request body"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden - Viewer or unauthorized team member
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "forbidden"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
    delete:
      summary: Delete a Prompt
      description: Hard deletes a specific prompt by its unique UUID.
      operationId: deletePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt.
          schema:
            type: string
            format: uuid
      x-edge-cases:
        - "Forbidden: Attempting to delete a prompt with viewer permissions."
        - "NotFound: Attempting to delete a non-existent prompt ID or a prompt under an unauthorized team."
      x-test-coverage:
        - "TestDeletePrompt_Success: Verifies deleting with editor token."
        - "TestDeletePrompt_ViewerForbidden: Verifies viewer gets a 403 response."
        - "TestDeletePrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "204":
          description: Prompt deleted successfully
        "400":
          description: Invalid input or invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden - Viewer or unauthorized team member
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}/archive:
    post:
      summary: Archive a Prompt
      description: Archives a specific prompt container, setting `status` to 'archived'. The prompt still exists in the system and people can call it and use it, so a prompt is never deleted. Requires Org Admin or Team Admin privileges (GitHub repo owner model). Team Editors and Team Members are not authorized to archive prompts.
      operationId: archivePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      x-edge-cases:
        - "Only Org Admins and Team Admins can archive a prompt."
        - "Team Editors and Team Members (viewers) are forbidden from archiving prompts."
      x-test-coverage:
        - "TestArchivePrompt_Permissions: Verifies that a Team Member (viewer) cannot archive a prompt (returns 403 Forbidden)."
        - "TestArchivePrompt_Permissions: Verifies that a Team Editor cannot archive a prompt (returns 403 Forbidden)."
        - "TestArchivePrompt_Permissions: Verifies that a Team Admin can successfully archive a prompt (returns 200 OK with prompt details)."
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt to archive.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Prompt successfully archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt id"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "forbidden"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

  /v1/prompts/{id}/restore:
    post:
      summary: Restore a Prompt
      description: Restores a previously archived prompt setting `status` back to 'active'. Requires Team Admin or Org Admin.
      operationId: restorePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Prompt successfully restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}/move:
    post:
      summary: Move a Prompt
      description: Moves a prompt from its current team to another team. Requires admin privileges on both teams.
      operationId: movePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - team_id
              properties:
                team_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Prompt successfully moved
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format or team_id
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

components:
  schemas:
    Prompt:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier.
        team_id:
          type: string
          format: uuid
          description: Unique identifier of the team.
        slug:
          type: string
          description: Unique slug within the team.
        name:
          type: string
