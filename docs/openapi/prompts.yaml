openapi: 3.1.0
info:
  title: Prompts & Rendering API
  version: 1.0.0
paths:
  /v1/teams/{teamID}/prompts:
    post:
      summary: Create a Prompt
      description: Creates a new prompt container.
      operationId: createPrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the team.
      x-test-coverage:
        - "TestCreatePrompt_Success: Verifies prompt creation and response payload."
        - "TestCreatePrompt_MissingName: Verifies that missing name returns 400 and 'name is required'."
        - "TestCreatePrompt_Unauthorized: Verifies that unauthenticated request returns 401."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromptRequest"
      responses:
        "201":
          description: Prompt created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                invalid_body:
                  value: { "error": "invalid request body" }
                name_required:
                  value: { "error": "name is required" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

    get:
      summary: List Prompts
      description: Lists all available prompt containers.
      operationId: listPrompts
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the team.
        - name: archived
          in: query
          required: false
          description: Optional boolean to filter prompts by archive state.
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          description: >
            Full-text search query. When provided, results are filtered and ranked
            by relevance across prompt name, description, and slug using
            PostgreSQL Full-Text Search. When absent, returns the unranked list.
          schema:
            type: string
            example: "summarize text"
      x-edge-cases:
        - "When ?q= is absent or empty, falls back to the standard listing path with no change in behaviour."
        - "When ?q= is present and no results match, returns an empty array (not 404)."
        - "Tags filtering at list endpoints is not part of the current API contract (out of scope)."
        - "Pagination is deferred — no Limit/Offset/TotalCount yet."
        - "Score is internal-only; not exposed in the API response."
      x-test-coverage:
        - "TestListPrompts: Verifies listing populated prompt containers."
        - "TestListPrompts_Empty: Verifies that listing when empty returns an empty array."
      responses:
        "200":
          description: List of prompts
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Prompt"
                required:
                  - prompts
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

  /v1/prompts:
    get:
      summary: List all prompts with team filter
      description: Returns a list of prompts. If team_id query parameter is not provided, returns an empty list by default. Users can filter by a team they are a member of.
      operationId: listAllPrompts
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: team_id
          in: query
          required: false
          description: Optional UUID of the team to filter prompts (alias of team).
          schema:
            type: string
            format: uuid
        - name: team
          in: query
          required: false
          description: Optional UUID of the team to filter prompts (alias of team_id).
          schema:
            type: string
            format: uuid
        - name: archived
          in: query
          required: false
          description: Optional boolean to filter prompts by archive state.
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          description: >
            Full-text search query. When provided, results are filtered and ranked
            by relevance across prompt name, description, and slug using
            PostgreSQL Full-Text Search. When absent, returns the unranked list.
          schema:
            type: string
            example: "summarize text"
      x-edge-cases:
        - "By default with no team_id query parameter, returns an empty list of prompts."
        - "If a team_id is provided, checks if the user is a member of that team, otherwise returns 403 Forbidden."
        - "When ?q= is absent or empty, falls back to the standard listing path with no change in behaviour."
        - "When ?q= is present and no results match, returns an empty array (not 404)."
        - "Tags filtering at list endpoints is not part of the current API contract (out of scope)."
        - "Pagination is deferred — no Limit/Offset/TotalCount yet."
        - "Score is internal-only; not exposed in the API response."
      x-test-coverage:
        - "TestListAllPrompts: Verifies that no team_id returns 200 with an empty list."
        - "TestListAllPrompts: Verifies that a valid team_id returns 200 with prompts of that team."
        - "TestListAllPrompts: Verifies that an unallowed team_id returns 403 Forbidden."
      responses:
        "200":
          description: A list of prompts
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Prompt"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}:
    get:
      summary: Get a Prompt
      description: Returns details of a specific prompt container by its unique UUID or unique slug. Optionally retrieves version or tag details if requested via query parameters.
      operationId: getPrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID or unique slug of the prompt.
          schema:
            type: string
        - name: version
          in: query
          required: false
          description: Optional version sequence number (integer) or version tag (string) to retrieve along with the prompt details.
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: Optional version tag (string) to retrieve along with the prompt details.
          schema:
            type: string
      x-test-coverage:
        - "TestGetPrompt_Success: Verifies finding a prompt by ID."
        - "TestGetPrompt_BySlugAndVersion: Verifies finding a prompt by slug, with version, and with tag query parameter."
        - "TestGetPrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "200":
          description: Prompt details
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                  version:
                    $ref: "./prompt-versions.yaml#/components/schemas/PromptVersion"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt id"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"
    put:
      summary: Update a Prompt
      description: Updates the description of a specific prompt by its unique UUID.
      operationId: updatePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptRequest"
      x-edge-cases:
        - "Forbidden: Attempting to update a prompt with viewer permissions."
        - "NotFound: Attempting to update a non-existent prompt ID or a prompt under an unauthorized team."
      x-test-coverage:
        - "TestUpdatePrompt_Success: Verifies updating description with editor token."
        - "TestUpdatePrompt_ViewerForbidden: Verifies viewer gets a 403 response."
        - "TestUpdatePrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "200":
          description: Prompt updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid input or invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid request body"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden - Viewer or unauthorized team member
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "forbidden"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
    delete:
      summary: Delete a Prompt
      description: Hard deletes a specific prompt by its unique UUID.
      operationId: deletePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt.
          schema:
            type: string
            format: uuid
      x-edge-cases:
        - "Forbidden: Attempting to delete a prompt with viewer permissions."
        - "NotFound: Attempting to delete a non-existent prompt ID or a prompt under an unauthorized team."
      x-test-coverage:
        - "TestDeletePrompt_Success: Verifies deleting with editor token."
        - "TestDeletePrompt_ViewerForbidden: Verifies viewer gets a 403 response."
        - "TestDeletePrompt_NotFound: Verifies 404 response on missing prompt ID."
      responses:
        "204":
          description: Prompt deleted successfully
        "400":
          description: Invalid input or invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden - Viewer or unauthorized team member
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}/archive:
    post:
      summary: Archive a Prompt
      description: Archives a specific prompt container, setting `status` to 'archived'. The prompt still exists in the system and people can call it and use it, so a prompt is never deleted. Requires Org Admin or Team Admin privileges (GitHub repo owner model). Team Editors and Team Members are not authorized to archive prompts.
      operationId: archivePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      x-edge-cases:
        - "Only Org Admins and Team Admins can archive a prompt."
        - "Team Editors and Team Members (viewers) are forbidden from archiving prompts."
      x-test-coverage:
        - "TestArchivePrompt_Permissions: Verifies that a Team Member (viewer) cannot archive a prompt (returns 403 Forbidden)."
        - "TestArchivePrompt_Permissions: Verifies that a Team Editor cannot archive a prompt (returns 403 Forbidden)."
        - "TestArchivePrompt_Permissions: Verifies that a Team Admin can successfully archive a prompt (returns 200 OK with prompt details)."
      parameters:
        - name: id
          in: path
          required: true
          description: The unique UUID of the prompt to archive.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Prompt successfully archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt id"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "forbidden"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "prompt not found"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

  /v1/prompts/{id}/restore:
    post:
      summary: Restore a Prompt
      description: Restores a previously archived prompt setting `status` back to 'active'. Requires Team Admin or Org Admin.
      operationId: restorePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Prompt successfully restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/prompts/{id}/move:
    post:
      summary: Move a Prompt
      description: Moves a prompt from its current team to another team. Requires admin privileges on both teams.
      operationId: movePrompt
      tags:
        - Prompts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - team_id
              properties:
                team_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Prompt successfully moved
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt:
                    $ref: "#/components/schemas/Prompt"
                required:
                  - prompt
        "400":
          description: Invalid UUID format or team_id
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

components:
  schemas:
    Prompt:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier.
        team_id:
          type: string
          format: uuid
          description: Unique identifier of the team.
        slug:
          type: string
          description: Unique slug within the team.
        name:
          type: string
          description: Name of the prompt container.
        description:
          type: string
          description: Brief summary explaining the prompt purpose.
        status:
          type: string
          enum: [active, archived]
          description: Current status of the prompt container (active, archived).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - team_id
        - slug
        - name
        - description
        - status
        - created_at
        - updated_at
    CreatePromptRequest:
      type: object
      properties:
        name:
          type: string
          example: My Prompt
        description:
          type: string
          example: Useful prompt
        slug:
          type: string
          example: my_prompt
      required:
        - name
    UpdatePromptRequest:
      type: object
      properties:
        description:
          type: string
          description: Brief summary explaining the prompt purpose.
          example: "Useful greeting prompt"
