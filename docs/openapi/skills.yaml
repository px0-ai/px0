openapi: 3.1.0
info:
  title: Skills Registry Core API
  version: 1.0.0
paths:
  /v1/projects/{projectID}/skills:
    post:
      summary: Create a Skill
      description: Creates a new skill inside a project. Accepts JSON or multipart/form-data with a zip file.
      operationId: createSkill
      tags:
        - Skills
      security:
        - BearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSkillRequest"
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                file:
                  type: string
                  format: binary
              required:
                - name
      responses:
        "201":
          description: Skill created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill:
                    $ref: "#/components/schemas/Skill"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Project not found
        "409":
          description: Duplicate skill name or slug
    get:
      summary: List Skills
      description: Lists the skills inside a project.
      operationId: listSkills
      tags:
        - Skills
      security:
        - BearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the project.
      responses:
        "200":
          description: List of skills
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: "#/components/schemas/Skill"

  /v1/skills/{id}:
    get:
      summary: Get a Skill
      description: Retrieves details of a specific skill by ID or slug.
      operationId: getSkill
      tags:
        - Skills
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The ID (UUID) or slug of the skill.
      responses:
        "200":
          description: Skill details
        "404":
          description: Skill not found

    put:
      summary: Update a Skill
      description: Updates the metadata of a specific skill.
      operationId: updateSkill
      tags:
        - Skills
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the skill.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSkillRequest"
      responses:
        "200":
          description: Skill updated successfully
        "404":
          description: Skill not found

    delete:
      summary: Delete a Skill
      description: Deletes a specific skill and all its versions/files.
      operationId: deleteSkill
      tags:
        - Skills
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the skill.
      responses:
        "200":
          description: Skill deleted successfully
        "404":
          description: Skill not found

components:
  schemas:
    Skill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - project_id
        - name
        - slug

    CreateSkillRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
      required:
        - name

    UpdateSkillRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
