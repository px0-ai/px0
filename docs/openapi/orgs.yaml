paths:
  /v1/me/orgs:
    get:
      summary: List User Organizations
      description: Returns a list of organizations the authenticated user belongs to.
      operationId: listUserOrgs
      tags:
        - Organizations
      security:
        - BearerAuth: []
      responses:
        "200":
          description: A list of organizations with roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrganizationWithRole"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
  /v1/orgs:
    post:
      summary: Create Organization
      description: Creates a new organization. Requires admin privileges.
      operationId: createOrg
      tags:
        - Organizations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Acme Corp"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  org:
                    $ref: "#/components/schemas/Organization"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
  /v1/orgs/{id}:
    put:
      summary: Update Organization
      description: Updates an existing organization's metadata. Requires admin privileges.
      operationId: updateOrg
      tags:
        - Organizations
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Acme Industries"
      responses:
        "200":
          description: Updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  org:
                    $ref: "#/components/schemas/Organization"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

components:
  schemas:
    Organization:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
    OrganizationWithRole:
      type: object
      required:
        - id
        - name
        - role
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, MEMBER]
          example: ADMIN
        created_at:
          type: string
          format: date-time
