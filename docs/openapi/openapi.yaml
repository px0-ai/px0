  /v1/prompts/{id}/payloads/{payloadID}:
    $ref: "./prompt-payloads.yaml#/paths/~1v1~1prompts~1{id}~1payloads~1{payloadID}"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Use an access token retrieved from login (Bearer <token>).
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Use a programmatic API key generated under API Keys CRUD (X-API-Key <key>).
  schemas:
    APIError:
      $ref: "./auth.yaml#/components/schemas/APIError"
    User:
      $ref: "./auth.yaml#/components/schemas/User"
    APIKey:
      $ref: "./api-keys.yaml#/components/schemas/APIKey"
    Organization:
      $ref: "./orgs.yaml#/components/schemas/Organization"
    OrganizationWithRole:
      $ref: "./orgs.yaml#/components/schemas/OrganizationWithRole"
    Team:
      $ref: "./teams.yaml#/components/schemas/Team"
    TeamJoinRequest:
      $ref: "./team-memberships.yaml#/components/schemas/TeamJoinRequest"
    InboxItem:
      $ref: "./team-memberships.yaml#/components/schemas/InboxItem"
    Prompt:
      $ref: "./prompts.yaml#/components/schemas/Prompt"
    PromptVersion:
      $ref: "./prompt-versions.yaml#/components/schemas/PromptVersion"
    RenderRequest:
      $ref: "./prompt-renders.yaml#/components/schemas/RenderRequest"
    RenderResponse:
      $ref: "./prompt-renders.yaml#/components/schemas/RenderResponse"
    PromptPayload:
      $ref: "./prompt-payloads.yaml#/components/schemas/PromptPayload"
    CreatePromptPayloadRequest:
      $ref: "./prompt-payloads.yaml#/components/schemas/CreatePromptPayloadRequest"
    UpdatePromptPayloadRequest:
      $ref: "./prompt-payloads.yaml#/components/schemas/UpdatePromptPayloadRequest"
    UpdatePromptRequest:
      $ref: "./prompts.yaml#/components/schemas/UpdatePromptRequest"
