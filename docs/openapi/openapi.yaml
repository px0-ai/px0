  /v1/teams/{id}:
    $ref: "./teams.yaml#/paths/~1v1~1teams~1{id}"
  /v1/teams/{id}/members:
    $ref: "./team-memberships.yaml#/paths/~1v1~1teams~1{id}~1members"
  /v1/teams/{id}/members/{userID}:
    $ref: "./team-memberships.yaml#/paths/~1v1~1teams~1{id}~1members~1{userID}"
  /v1/teams/{id}/members/{userID}/role:
    $ref: "./team-memberships.yaml#/paths/~1v1~1teams~1{id}~1members~1{userID}~1role"
  /v1/teams/{id}/join-requests:
    $ref: "./team-memberships.yaml#/paths/~1v1~1teams~1{id}~1join-requests"
