openapi: 3.1.0
info:
  title: px0 API
  description: |
    Core API for px0, a modern prompt management, versioning, and execution service.
    
    This specification serves as the source of truth for downstream code generation,
    including Documentation, SDKs, CLIs, and Model Context Protocol (MCP) servers.
    All endpoints are rigorously validated against this specification at test time
    to ensure absolute zero-drift between implementation and documentation.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /v1/health:
    $ref: "./health.yaml#/paths/~1v1~1health"
  /v1/auth/register:
    $ref: "./auth.yaml#/paths/~1v1~1auth~1register"
  /v1/auth/login:
    $ref: "./auth.yaml#/paths/~1v1~1auth~1login"
  /v1/auth/verify:
    $ref: "./auth.yaml#/paths/~1v1~1auth~1verify"
  /v1/auth/session:
    $ref: "./auth.yaml#/paths/~1v1~1auth~1session"
  /v1/auth/me:
    $ref: "./auth.yaml#/paths/~1v1~1auth~1me"
  /v1/api-keys:
    $ref: "./api-keys.yaml#/paths/~1v1~1api-keys"
  /v1/api-keys/{id}:
    $ref: "./api-keys.yaml#/paths/~1v1~1api-keys~1{id}"
  /v1/me/teams:
    $ref: "./teams.yaml#/paths/~1v1~1me~1teams"
  /v1/orgs/{orgID}/teams:
    $ref: "./teams.yaml#/paths/~1v1~1orgs~1{orgID}~1teams"
  /v1/teams/{id}:
    $ref: "./teams.yaml#/paths/~1v1~1teams~1{id}"
  /v1/teams/{id}/members:
    $ref: "./teams.yaml#/paths/~1v1~1teams~1{id}~1members"
  /v1/teams/{id}/members/{userID}:
    $ref: "./teams.yaml#/paths/~1v1~1teams~1{id}~1members~1{userID}"
  /v1/orgs:
    $ref: "./orgs.yaml#/paths/~1v1~1orgs"
  /v1/orgs/{id}:
    $ref: "./orgs.yaml#/paths/~1v1~1orgs~1{id}"
  /v1/teams/{teamID}/prompts:
    $ref: "./prompts.yaml#/paths/~1v1~1teams~1{teamID}~1prompts"
  /v1/prompts/{id}:
    $ref: "./prompts.yaml#/paths/~1v1~1prompts~1{id}"
  /v1/prompts/{id}/render:
    $ref: "./prompts.yaml#/paths/~1v1~1prompts~1{id}~1render"
  /v1/prompts/{id}/versions:
    $ref: "./prompts.yaml#/paths/~1v1~1prompts~1{id}~1versions"
  /v1/prompts/{id}/versions/{version}:
    $ref: "./prompts.yaml#/paths/~1v1~1prompts~1{id}~1versions~1{version}"
  /v1/prompts/{id}/versions/{version}/publish:
    $ref: "./prompts.yaml#/paths/~1v1~1prompts~1{id}~1versions~1{version}~1publish"
  /v1/prompts/{id}/versions/{version}/render:
    $ref: "./prompts.yaml#/paths/~1v1~1prompts~1{id}~1versions~1{version}~1render"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Use a session token retrieved from login (Bearer <token>).
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Use a programmatic API key generated under API Keys CRUD (X-API-Key <key>).
  schemas:
    APIError:
      $ref: "./auth.yaml#/components/schemas/APIError"
    User:
      $ref: "./auth.yaml#/components/schemas/User"
    APIKey:
      $ref: "./api-keys.yaml#/components/schemas/APIKey"
    Organization:
      $ref: "./orgs.yaml#/components/schemas/Organization"
    Prompt:
      $ref: "./prompts.yaml#/components/schemas/Prompt"
    PromptVersion:
      $ref: "./prompts.yaml#/components/schemas/PromptVersion"
    RenderRequest:
      $ref: "./prompts.yaml#/components/schemas/RenderRequest"
    RenderResponse:
      $ref: "./prompts.yaml#/components/schemas/RenderResponse"
