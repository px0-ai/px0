    $ref: "./team-memberships.yaml#/paths/~1v1~1join-requests~1{id}"
  /v1/orgs:
    $ref: "./orgs.yaml#/paths/~1v1~1orgs"
  /v1/orgs/{id}:
    $ref: "./orgs.yaml#/paths/~1v1~1orgs~1{id}"
  /v1/orgs/{orgID}/people:
