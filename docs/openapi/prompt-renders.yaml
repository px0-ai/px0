openapi: 3.1.0
info:
  title: Prompt Rendering and Execution API
  version: 1.0.0
paths:
  /v1/projects/{projectID}/prompts/{slug}/render:
    post:
      summary: Render Live Prompt Version
      description: Renders the active 'live' template version of a prompt using supplied variables. The prompt is resolved by slug within the given project, so the same slug may be reused across projects.
      operationId: renderLive
      tags:
        - Prompt Renders
      security:
        - BearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project the prompt belongs to.
          schema:
            type: string
            format: uuid
        - name: slug
          in: path
          required: true
          description: Prompt slug, unique within the project.
          schema:
            type: string
      x-edge-cases:
        - "Fails with 404 if no live version is found."
        - "Fails with 422 if template execution fails due to invalid parameters or template syntax mismatches."
        - "Fails with 422 when the template references a variable that is not present in the request variables."
      x-test-coverage:
        - "TestRenderLive_Success: Verifies rendering with complete variables returning 200 OK."
        - "TestRenderLive_NoLiveVersion: Verifies that requesting a render with only 'draft' versions fails with 404 and 'no live version found for this prompt'."
        - "TestRenderLive_NoVariables: Verifies static templates render correctly when empty variables are supplied."
        - "TestRenderLive_MissingVariable: Verifies missing template variables fail with 422 instead of rendering placeholder text."
        - "TestRenderLive_IncludesModelConfig: Verifies render responses include the prompt version model and parameters."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderRequest"
      responses:
        "200":
          description: Rendered template string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderResponse"
        "400":
          description: Invalid slug or bad body JSON
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid prompt slug"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Prompt or live version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              examples:
                prompt_not_found:
                  value: { "error": "prompt not found" }
                no_live_version:
                  value: { "error": "no live version found for this prompt" }
        "422":
          description: Render execution failed
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "template execution failed: ..."
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "internal error"

  /v1/projects/{projectID}/prompts/{slug}/versions/{version}/render:
    post:
      summary: Render Specific Prompt Version
      description: Renders a specific template version of a prompt (even draft status) using supplied variables. The prompt is resolved by slug within the given project.
      operationId: renderVersion
      tags:
        - Prompt Renders
      security:
        - BearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project the prompt belongs to.
          schema:
            type: string
            format: uuid
        - name: slug
          in: path
          required: true
          description: Prompt slug, unique within the project.
          schema:
            type: string
        - name: version
          in: path
          required: true
          description: Version sequence number (integer) or version tag (string) to render.
          schema:
            type: string
      x-edge-cases:
        - "Fails with 422 when the template references a variable that is not present in the request variables."
      x-test-coverage:
        - "TestRenderVersion_Draft: Verifies that rendering works on draft templates."
        - "TestRenderVersion_MissingVariable: Verifies missing template variables fail with 422 for explicit version renders."
        - "TestRenderVersion_NotFound: Verifies 404 response if the requested version sequence number does not exist."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderRequest"
      responses:
        "200":
          description: Rendered template string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderResponse"
        "400":
          description: Invalid path formatting
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "invalid version number"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "unauthorized"
        "404":
          description: Prompt or version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "version not found"
        "422":
          description: Execution failure
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
              example:
                error: "template execution failed: ..."

  /v1/projects/{projectID}/prompts/{slug}/run:
    post:
      summary: Run Live Prompt Version
      description: Renders the active 'live' template version and executes it against the configured model provider (e.g. OpenAI or Anthropic). Supports ad-hoc overrides for models and params, and unified stream mode.
      operationId: runLive
      tags:
        - Prompt Runs
      security:
        - BearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project the prompt belongs to.
          schema:
            type: string
            format: uuid
        - name: slug
          in: path
          required: true
          description: Prompt slug, unique within the project.
          schema:
            type: string
      x-edge-cases:
        - "Fails with 400 if provider key is missing."
        - "Fails with 502 Bad Gateway if provider API returns non-200."
      x-test-coverage:
        - "TestRunLive_Success_OpenAI_Block: Verifies block model completions for OpenAI."
        - "TestRunLive_Success_OpenAI_Stream: Verifies unified Server-Sent Events delta streams for OpenAI."
        - "TestRunLive_Success_Anthropic_Block: Verifies block completions for Anthropic."
        - "TestRunLive_Success_Anthropic_Stream: Verifies unified SSE streams for Anthropic."
        - "TestRunLive_AdhocOverrides: Verifies that model and model_params overrides take precedence."
        - "TestRunLive_ProviderErrorHandling: Verifies bad gateway is returned on upstream errors."
        - "TestRunLive_MissingAPIKey: Verifies key requirement check."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: 'Completed response text (non-streaming) or stream chunk headers (streaming). Streaming SSE events where each line is formatted as data: {"delta": string, "done": boolean}.'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
            text/event-stream:
              schema:
                type: string
        "400":
          description: Missing keys or invalid parameters
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt or version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "502":
          description: Upstream model provider error
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/projects/{projectID}/prompts/{slug}/batch-run:
    post:
      summary: Batch Run Live Prompt Version
      description: Renders the active 'live' template version and executes it concurrently against multiple variable payloads.
      operationId: batchRunLive
      tags:
        - Prompt Runs
      security:
        - BearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project the prompt belongs to.
          schema:
            type: string
            format: uuid
        - name: slug
          in: path
          required: true
          description: Prompt slug, unique within the project.
          schema:
            type: string
      x-edge-cases:
        - "Executes multiple variable payloads concurrently."
        - "Correlates completions or errors for each payload in the batch."
      x-test-coverage:
        - "TestBatchRun_Success_OpenAI: Verifies batch block completions for OpenAI."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRunRequest"
      responses:
        "200":
          description: Correlated list of model completions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchRunResponse"
        "400":
          description: Missing keys or invalid parameters
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Prompt or version not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

  /v1/projects/{projectID}/prompts/{slug}/versions/{version}/run:
    post:
      summary: Run Specific Prompt Version
      description: Renders a specific template version of a prompt and executes it against the configured model provider.
      operationId: runVersion
      tags:
        - Prompt Runs
      security:
        - BearerAuth: []
      parameters:
        - name: projectID
          in: path
          required: true
          description: The ID of the project the prompt belongs to.
          schema:
            type: string
            format: uuid
        - name: slug
          in: path
          required: true
          description: Prompt slug, unique within the project.
          schema:
            type: string
        - name: version
          in: path
          required: true
          description: Version sequence number (integer) or version tag (string) to execute.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: 'Completed response text or stream chunks (Streaming SSE events where each line is formatted as data: {"delta": string, "done": boolean}).'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"
        "502":
          description: Provider failure
          content:
            application/json:
              schema:
                $ref: "./auth.yaml#/components/schemas/APIError"

components:
  schemas:
    RenderRequest:
      type: object
      properties:
        variables:
          type: object
          additionalProperties: true
          description: Key-value dictionary of arguments interpolated into the prompt template.
          example: { "name": "Alice", "count": 5 }
    RenderResponse:
      type: object
      properties:
        rendered:
          type: string
          description: Fully parsed template response with variable replacements.
          example: "Hello, Alice! Count is 5."
        version:
          type: integer
          description: Sequence version number that was executed.
          example: 1
        slug:
          type: string
          description: Unique prompt slug.
          example: my_prompt
        tags:
          type: array
          items:
            type: string
          description: List of tag strings assigned to this version.
        model:
          type: string
          nullable: true
          description: Optional `provider/model` identifier intended to execute this prompt version.
          example: anthropic/claude-opus-4-6
        model_params:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional provider-specific model parameters. Nested values are supported.
          example:
            temperature: 0.7
            max_tokens: 1024
      required:
        - rendered
        - version
        - slug
        - tags
        - model
        - model_params

    RunRequest:
      type: object
      properties:
        variables:
          type: object
          additionalProperties: true
          description: Variables to interpolate into the template.
        stream:
          type: boolean
          description: Set to true to receive token stream instead of a blocked response.
          default: false
        model:
          type: string
          nullable: true
          description: "Ad-hoc model override. Must start with a supported provider prefix: 'openai/', 'anthropic/', 'gemini/', 'deepseek/', 'groq/', or 'openrouter/'. All providers except 'anthropic/' follow standard OpenAI-compatible JSON request, response, and SSE streaming conventions."
        model_params:
          type: object
          nullable: true
          additionalProperties: true
          description: Ad-hoc model parameters override.

    RunResponse:
      type: object
      properties:
        response:
          type: string
          description: Text content produced by the model provider completion.
          example: "Greetings from the model!"
        model:
          type: string
          description: The model identifier that was executed.
          example: openai/gpt-4o
        version:
          type: integer
          description: The prompt version number that was used.
          example: 2
        slug:
          type: string
          description: Prompt slug.
          example: my-prompt
      required:
        - response
        - model
        - version
        - slug

    BatchRunRequest:
      type: object
      properties:
        batch:
          type: array
          items:
            type: object
            properties:
              variables:
                type: object
                additionalProperties: true
        model:
          type: string
          nullable: true
        model_params:
          type: object
          nullable: true
          additionalProperties: true
      required:
        - batch

    BatchRunResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              response:
                type: string
              error:
                type: string
        model:
          type: string
        version:
          type: integer
        slug:
          type: string
      required:
        - results
        - model
        - version
        - slug
